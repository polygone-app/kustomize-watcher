[tools]
go = "1.26.2"
goreleaser = "latest"

[tools."pipx:properdocs"]
version = "latest"
uvx_args = """
  --with mkdocs-material
  --with mkdocs-mermaid2-plugin
  --with mkdocs-panzoom-plugin
  --with mkdocs-d2-plugin
  --with mkdocs-macros-plugin
  --with markdown-exec
  --with mkdocs-protobuf
  --with mkdocs-git-revision-date-localized-plugin
  --with mkdocs-git-authors-plugin
  --with mkdocs-pygments
  --with mkdocs-redirects
  --with mkdocs-autolinks-plugin
  --with mkdocs-techdocs-core
  --with mkdocs-monorepo-plugin
"""

[env]
GOPATH = "{{env.HOME}}/go"
PROJECT_NAME = "{{ config_root | basename }}"
_.python.venv = { path = ".venv", create = true }
